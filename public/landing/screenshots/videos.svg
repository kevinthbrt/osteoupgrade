<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="800">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" rx="16" fill="url(#bg)"/>
  <rect x="40" y="40" width="240" height="720" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <!-- Video player area -->
  <rect x="300" y="40" width="560" height="380" rx="12" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.1)" stroke-width="1"/>
  <!-- Play button -->
  <circle cx="580" cy="230" r="36" fill="rgba(249,115,22,0.15)" stroke="rgba(249,115,22,0.3)" stroke-width="2"/>
  <polygon points="570,212 570,248 598,230" fill="rgba(249,115,22,0.4)"/>
  <!-- Video info -->
  <rect x="880" y="40" width="280" height="380" rx="12" fill="rgba(255,255,255,0.03)" stroke="rgba(255,255,255,0.06)" stroke-width="1"/>
  <rect x="910" y="80" width="220" height="20" rx="4" fill="rgba(255,255,255,0.08)"/>
  <rect x="910" y="120" width="160" height="12" rx="4" fill="rgba(255,255,255,0.04)"/>
  <!-- Related videos grid -->
  <rect x="300" y="440" width="200" height="140" rx="8" fill="rgba(249,115,22,0.05)" stroke="rgba(249,115,22,0.08)" stroke-width="1"/>
  <rect x="520" y="440" width="200" height="140" rx="8" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.06)" stroke-width="1"/>
  <rect x="740" y="440" width="200" height="140" rx="8" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.06)" stroke-width="1"/>
  <rect x="960" y="440" width="200" height="140" rx="8" fill="rgba(249,115,22,0.04)" stroke="rgba(249,115,22,0.06)" stroke-width="1"/>
  <!-- Center message -->
  <text x="600" y="650" text-anchor="middle" fill="rgba(255,255,255,0.25)" font-family="system-ui, sans-serif" font-size="24" font-weight="600">Techniques en video</text>
  <text x="600" y="680" text-anchor="middle" fill="rgba(255,255,255,0.15)" font-family="system-ui, sans-serif" font-size="14">Remplacez par votre capture (1200x800px)</text>
</svg>