<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{TITLE}} — OsteoUpgrade</title>
<style>
  :root {
    --navy: #0f172a;
    --blue: #2563eb;
    --cyan: #06b6d4;
    --gray-50: #f8fafc;
    --gray-200: #e2e8f0;
    --text-dark: #0f172a;
    --text-mid: #334155;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    font-family: Georgia, serif;
    background: transparent;
    color: var(--text-dark);
    font-size: 17px;
    line-height: 1.75;
  }
  .hero {
    background:
      radial-gradient(circle at 80% 20%, rgba(6,182,212,0.18), transparent 22%),
      radial-gradient(circle at 15% 45%, rgba(59,130,246,0.12), transparent 18%),
      linear-gradient(135deg, #0f172a 0%, #16253b 45%, #1d4ed8 100%);
    color: white;
    padding: 64px 28px 48px;
  }
  .hero-inner, .content-wrap { max-width: 900px; margin: 0 auto; }
  .hero-eyebrow { font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color:#bfdbfe; margin-bottom: 16px; }
  .hero h1 { font-size: clamp(2rem, 5vw, 3rem); line-height: 1.1; margin-bottom: 12px; }
  .hero-subtitle { color: rgba(255,255,255,0.78); font-style: italic; max-width: 700px; }
  .hero-tags { display:flex; gap:8px; flex-wrap:wrap; margin-top:18px; }
  .hero-tag { font-size:10px; text-transform: uppercase; border: 1px solid rgba(147,197,253,0.25); padding: 4px 10px; border-radius:999px; color:#bfdbfe; }
  .content-wrap { padding: 48px 28px 72px; }
  .section { margin-bottom: 48px; }
  h2 { font-size: 1.55rem; margin-bottom: 16px; border-bottom: 2px solid var(--gray-200); padding-bottom: 8px; }
  h3 { font-size: 1.15rem; margin: 24px 0 10px; }
  p { margin-bottom: 12px; color: var(--text-mid); }
  ul, ol { margin: 12px 0 12px 22px; color: var(--text-mid); }
  .callout { margin: 18px 0; padding: 14px 16px; border: 1px solid #dbeafe; border-left: 4px solid var(--blue); border-radius: 10px; background: #eff6ff; }
  .table-wrap { overflow-x:auto; margin: 14px 0; }
  table { width:100%; border-collapse: collapse; }
  th, td { border: 1px solid var(--gray-200); padding: 10px; text-align: left; }
  th { background: var(--gray-50); }
</style>
</head>
<body>
<section class="hero">
  <div class="hero-inner">
    <div class="hero-eyebrow">{{EYEBROW}}</div>
    <h1>{{TITLE}}</h1>
    <p class="hero-subtitle">{{SUBTITLE}}</p>
    <div class="hero-tags">{{TAGS_HTML}}</div>
  </div>
</section>
<div class="content-wrap">
{{CONTENT_HTML}}
</div>
</body>
</html>
